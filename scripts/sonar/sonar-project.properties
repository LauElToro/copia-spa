# SonarQube project configuration for Liberty Club SPA

# Basic project information
sonar.projectKey=liberty-club-spa
sonar.projectName=Liberty Club SPA
sonar.projectVersion=1.0.0

# SonarQube server configuration
sonar.host.url=http://localhost:9002
# Usar token en lugar de usuario/contraseña
# Primero necesitas crear un token en SonarQube: http://localhost:9002
# sonar.token=your_token_here
# Por ahora usamos las credenciales por defecto
sonar.login=admin
sonar.password=admin

# Source code configuration
sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclude files and directories
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/coverage/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Test configuration
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# TypeScript configuration
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Analysis configuration
sonar.analysis.mode=publish

# Output configuration
sonar.issuesReport.html.enable=true
sonar.issuesReport.console.enable=true

# Quality gate
sonar.qualitygate.wait=true
